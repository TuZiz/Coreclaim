title: '&8✦ 领地总览 ✦'
size: 45

items:
  filler:
    material: LIGHT_BLUE_STAINED_GLASS_PANE
    name: ' '
    custom-model-data: 1000

  info:
    slot: 11
    material: KNOWLEDGE_BOOK
    custom-model-data: 1101
    name: '&b&l玩家信息'
    lore:
      - '&7活跃度: &e{activity}'
      - '&7在线分钟: &e{online_minutes}'
      - '&7领地数量: &e{claim_count}&7/&e{claim_limit}'
    sound: ENTITY_EXPERIENCE_ORB_PICKUP

  group-info:
    slot: 13
    material: NAME_TAG
    custom-model-data: 1102
    name: '&6&l组别配置'
    lore:
      - '&7当前组: {group}'
      - '&7扩地单价: &6{expand_price}'
      - '&7单次扩地: &e{expand_amount} 格'
      - '&7最大单边: &e{max_distance} 格'
    sound: UI_BUTTON_CLICK

  current-claim:
    slot: 22
    material: GRASS_BLOCK
    custom-model-data: 1103
    glow: true
    name: '&a&l当前领地'
    lore:
      - '&7名称: &f{name}'
      - '&7大小: &e{width}x{depth}'
      - '&7面积: &e{area}'
      - '&8点击打开管理菜单'
    sound: BLOCK_NOTE_BLOCK_CHIME

  current-claim-empty:
    slot: 22
    material: BARRIER
    custom-model-data: 1104
    name: '&c&l当前没有可管理领地'
    lore:
      - '&7站在自己的领地中时'
      - '&7这里会变成快捷管理入口'

  claim-list:
    slot: 31
    material: MAP
    custom-model-data: 1105
    glow: true
    name: '&d&l我的领地'
    lore:
      - '&7查看所有已拥有的领地'
      - '&8点击打开列表'
    sound: ITEM_BOOK_PAGE_TURN

  close:
    slot: 40
    material: BARRIER
    custom-model-data: 1106
    name: '&c关闭菜单'
    sound: UI_BUTTON_CLICK
