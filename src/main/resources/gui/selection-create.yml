layout-version: 3
title: '&8[&6创建&8] &6&l选区创建确认 - {name}'
GuiPlain:
  - "FFFFFFFFF"
  - "FFFFIFFFF"
  - "FFFFFFFFF"
  - "FFFRFCFFF"
  - "FFFFFFFFF"
  - "FFFFBFFFF"

items:
  filler:
    char: "F"
    material: GRAY_STAINED_GLASS_PANE
    name: ' '
    custom-model-data: 1600

  info:
    char: "I"
    material: BOOK
    custom-model-data: 1710
    name: '&e&l创建概览'
    lore:
      - ''
      - ' &7领地名称: &b{name}'
      - ' &7创建世界: &e{world}'
      - ' &7核心坐标: &f({center_x}, {center_y}, {center_z})'
      - ''
      - ' &7宽度: &e{width}'
      - ' &7高度: &e{height}'
      - ' &7深度: &e{depth}'
      - ' &7占地面积: &e{area}'
      - ' &7总体积: &e{volume}'
      - ' &7预计花费: &6{cost}'
      - ''
      - ' &7当前状态: {status}'
      - ' &7普通金锄头可直接选区'
      - ' &7确认前会再次校验范围与价格'

  refresh:
    char: "R"
    material: CLOCK
    custom-model-data: 1715
    name: '&e&l刷新预览'
    lore:
      - ''
      - ' &7重新读取当前选区信息'
      - ' &7适合刚修改完选区后使用'
    sound: UI_BUTTON_CLICK

  confirm:
    char: "C"
    material: EMERALD
    custom-model-data: 1717
    glow: true
    name: '&a&l确认创建'
    lore:
      - ''
      - ' &7领地名称: &b{name}'
      - ' &7最终尺寸: &e{width}x{height}x{depth}'
      - ' &7预计花费: &6{cost}'
      - ''
      - ' &e点击正式创建领地'
    sound: ENTITY_PLAYER_LEVELUP

  cancel:
    char: "B"
    material: BARRIER
    custom-model-data: 1716
    name: '&c&l取消创建'
    lore:
      - ''
      - ' &7关闭本次创建确认页'
      - ' &7并清空当前选区'
    sound: UI_BUTTON_CLICK
