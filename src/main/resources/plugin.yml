name: CoreClaim
main: com.coreclaim.CoreClaimPlugin
version: ${version}
api-version: "1.20"
folia-supported: true
authors:
  - Codex
softdepend:
  - Vault
  - PlaceholderAPI
commands:
  claim:
    description: CoreClaim main command
    usage: /claim
    aliases: [lingdi, res, "领地", coreclaim, cc]
permissions:
  coreclaim.use:
    description: Use player claim commands
    default: true
  coreclaim.manage.deny:
    description: Manage deny access on the current claim
    default: true
  coreclaim.manage.tpset:
    description: Set the teleport point for the current claim
    default: true
  coreclaim.manage.flags:
    description: Manage interaction flags on the current claim
    default: true
  coreclaim.admin:
    description: Full CoreClaim administrator access
    default: op
  coreclaim.admin.view:
    description: View administrator-level claim details
    default: op
  coreclaim.admin.force:
    description: Force-edit and override claim restrictions
    default: op
  coreclaim.admin.ops:
    description: Use reload and operational commands
    default: op
  coreclaim.admin.create.system:
    description: Create system-managed claims from a selection
    default: op
  coreclaim.admin.member.manage:
    description: Force-manage claim members and denied players
    default: op
  coreclaim.admin.permission.manage:
    description: Force-manage default claim permissions
    default: op
  coreclaim.admin.flag.manage:
    description: Force-manage claim interaction flags
    default: op
  coreclaim.admin.claim.manage:
    description: Force-manage claim ownership, server, deletion, and system claims
    default: op
  coreclaim.admin.market.manage:
    description: Manage claim market behavior as an administrator
    default: op
  coreclaim.admin.activity.manage:
    description: Manage player activity values
    default: op
  coreclaim.admin.reward.givecore:
    description: Give claim cores manually
    default: op
  coreclaim.transfer:
    description: Transfer your own claims
    default: true
  coreclaim.sell:
    description: List your own claims for sale
    default: true
  coreclaim.market:
    description: Open the claim market
    default: true
