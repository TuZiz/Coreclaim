title: '&8✦ 成员权限 - {name} ✦'
GuiPlain:
  - "TTTTMTTTT"
  - "TTTTTTTTT"
  - "TTTTTTTTT"
  - "TTTTTTTTT"
  - "CCCCCCCCC"
  - "PFFFBFFFN"

items:
  filler:
    char: "F"
    material: LIGHT_GRAY_STAINED_GLASS_PANE
    name: ' '
    custom-model-data: 1400

  trusted-entry:
    char: "T"
    material: PLAYER_HEAD
    custom-model-data: 1401
    name: '&a已授权: &f{player}'
    lore:
      - '&7领地: &f{name}'
      - '&8点击移出权限列表'
    sound: BLOCK_NOTE_BLOCK_BASS

  candidate-entry:
    char: "C"
    material: PLAYER_HEAD
    custom-model-data: 1402
    glow: true
    name: '&b在线玩家: &f{player}'
    lore:
      - '&7领地: &f{name}'
      - '&8点击加入权限列表'
    sound: BLOCK_NOTE_BLOCK_PLING

  empty:
    char: "M"
    material: PAPER
    custom-model-data: 1403
    name: '&7暂无授权成员'
    lore:
      - '&7可以从下方选择在线玩家进行授权'

  prev-page:
    char: "P"
    material: ARROW
    custom-model-data: 1405
    name: '&e上一页'
    sound: UI_BUTTON_CLICK

  back:
    char: "B"
    material: BARRIER
    custom-model-data: 1406
    name: '&c返回领地管理'
    sound: UI_BUTTON_CLICK

  next-page:
    char: "N"
    material: ARROW
    custom-model-data: 1407
    name: '&e下一页'
    sound: UI_BUTTON_CLICK
