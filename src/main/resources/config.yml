# 固定可创建领地的世界
world: "world"
server-id: "local"
claim-worlds: []

# 玩家在线多少分钟后获得首个领地核心
starter-reward-minutes: 30

# 指令 / GUI 每次向单个方向扩建的固定格数
direction-expand-amount: 10

# 领地核心之间的最小间隔
# 当前版本会保证 50x50 内只能存在一个领地核心
minimum-gap: 50

# 锄头选区创建领地之间的最小边界间隔
# 只检查领地边界，不再沿用核心的 100 格限制
selection-minimum-gap: 10

# 领地名称最大长度
claim-name-max-length: 16

# 聊天输入超时秒数
chat-input-timeout-seconds: 30

# 领地转让请求超时秒数
transfer:
  request-timeout-seconds: 60

# 是否显示进入/离开领地提示
show-enter-leave-messages: true

# 领地扩建冷却，单位秒
expand-cooldown-seconds: 0

# 创建第二块领地时是否提醒玩家确认位置
warn-on-second-claim: true

# 兼容字段：保留活跃值系统，但不再作为圈地门槛
core-use-min-activity: 0

inactive-claim-cleanup:
  enabled: false
  inactive-days: 90
  grace-days: 14
  scan-interval-minutes: 30
  exempt-groups: []
  exempt-permissions: []
  ignore-system-claims: true

flight:
  # 离开可飞行领地后保留当前飞行的缓冲刻数
  exit-grace-ticks: 20
  reconcile-interval-ticks: 10
  debug: false

database:
  file: coreclaim.db
  # sqlite keeps the old single-server file database. mysql enables shared MySQL/MariaDB storage.
  type: sqlite
  sqlite:
    file: coreclaim.db
  mysql:
    host: localhost
    port: 3306
    database: coreclaim
    username: root
    password: ""
    use-ssl: false
    pool-size: 5
  migration:
    # Only used when database.type is mysql. The target MySQL database must be empty.
    enabled: false
    source-sqlite-file: coreclaim.db

cross-server-teleport:
  enabled: false
  pending-timeout-seconds: 30
  # Optional one-time legacy mapping for old claims without server_id.
  legacy-world-server-map: {}

claim-sync:
  enabled: false
  transport: "redis"
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""
    database: 0
    channel: "coreclaim:claim-sync"
    reconnect-seconds: 5

# 领地默认规则已迁移到 rules.yml
# 旧版 config.yml 中的 permissions.* / flags.* 仍会被兼容读取，但建议迁移后删除

# 领地核心物品
# 当前项目仍沿用 claim-core 作为主配置节点，同时兼容读取 core-tool.name / core-tool.lore
claim-core:
  material: "AMETHYST_CLUSTER"
  glow: false
  custom-model-data: 1700
  name: "&d&l领地核心"
  lore:
    - ""
    - " &f▶ &7用途: &e创建新的领地"
    - ""
    - " &8▪ &7对着地面右键后开始命名"
    - " &8▪ &7聊天输入领地名字后才会真正放下核心"
    - " &8▪ &7第一块领地也可以直接使用当前核心或圈地工具创建"

starter-tool:
  material: "AMETHYST_CLUSTER"
  glow: true
  custom-model-data: 1701
  name: "&b&l✦ 新人核心 ✦"
  lore:
    - ""
    - " &b&l首块领地推荐核心"
    - " &f▶ &7用途: &e用于创建第一块默认全格保护领地"
    - " &f▶ &7来源: &b在线 %starter-reward-minutes% 分钟自动发放"
    - ""
    - " &6▶ &7仅限首块领地使用"
    - " &6▶ &7每个玩家只能成功使用一次"
    - " &6▶ &7新人核心不能被丢弃"
    - " &6▶ &7对着地面右键后开始命名"
    - " &6▶ &7输入领地名字后才会真正放下核心"
    - " &6▶ &7后续领地也可以直接用普通金锄头选区创建"

center-core:
  material: "AMETHYST_CLUSTER"
  hologram-text: "&6&l领地核心 &8(&f%claim_name%&8)"
  hologram-height: 1.8

claim-visual:
  duration-seconds: 10
  interval-ticks: 10
  size: 1.2
  pillar-height: 12
  pillar-step: 0.6
  line-step: 3.0
  color:
    red: 80
    green: 255
    blue: 140

allow-interact: []

protection:
  allow-ender-pearl-entry: false
  allow-chorus-fruit-entry: false
  allow-portal-entry: false
  allow-fishing-hook-interact: false
  allow-vehicle-cross-border: false
  block-special-explosive-use: true
  strict-redstone-interact: true
  always-protected-interact:
    - "BELL"
    - "LEVER"
    - "LECTERN"
    - "NOTE_BLOCK"
    - "RESPAWN_ANCHOR"

# 组别相关的初始大小 / 最大扩建 / 单价 / 数量上限请到 groups.yml 配置
# =========================================================
# 💡 提示: 组别相关的 初始大小/最大扩建/单价/数量上限 
# 请前往 groups.yml 中进行详细配置
# =========================================================
selection-tool:
  material: "GOLDEN_HOE"
  glow: false
  custom-model-data: 0
  name: "&6&l✦ 领地选区金锄头 ✦"
  lore:
    - ""
    - "&8▪ &7拿着普通金锄头也会被识别为领地选区工具"
    - "&8▪ &7选好两个对角点后即可创建你的领地"
    - ""
    - "&b&l| &3操作指南"
    - "&8▪ &e[左键点击] &7方块 &0➜ &a设置 点 1"
    - "&8▪ &e[右键点击] &7方块 &0➜ &a设置 点 2"
    - ""
    - "&d&l| &5确认创建"
    - "&8▪ &7选好两个对角点后，输入指令："
    - "&8▪ &f/claim create <领地名字>"
    - ""
    - "&7提示: 领地大小上限由你的权限组决定"
